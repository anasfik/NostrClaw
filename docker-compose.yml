services:
  nostrmind:
    build: .
    container_name: nostrmind
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./nostr-mind.config.json:/app/nostr-mind.config.json:ro
    restart: unless-stopped
    # If using Ollama, point ai.ollama.baseUrl to http://ollama:11434 in your config
    # and uncomment the depends_on + ollama service below.
    #
    # depends_on:
    #   - ollama

  # Uncomment to run Ollama locally in Docker (GPU support requires the nvidia toolkit)
