<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NostrMind</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #06060f;
  --surface:   #0b0b1a;
  --panel:     #0e0e20;
  --border:    #15152a;
  --border2:   #1e1e38;
  --muted:     #33334e;
  --dim:       #55558a;
  --text:      #d8d8f0;
  --text2:     #9090b8;
  --violet:    #6d28d9;
  --violet2:   #7c3aed;
  --violet3:   #a78bfa;
  --green:     #10b981;
  --green2:    #34d399;
  --amber:     #f59e0b;
  --red:       #ef4444;
  --font:      'JetBrains Mono', 'Cascadia Code', 'Fira Code', ui-monospace, monospace;
  --r:         6px;
  --r2:        8px;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 12px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 9px; }

a { color: inherit; text-decoration: none; }
button { font-family: var(--font); cursor: pointer; }
input, textarea { font-family: var(--font); }

/* ── Layout ─────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100vh; }

/* ── Header ─────────────────────────────────────── */
#header {
  flex-shrink: 0;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.logo {
  font-size: 13px;
  font-weight: 700;
  color: var(--violet3);
  letter-spacing: -.01em;
}
.logo span { color: var(--muted); font-weight: 400; margin: 0 8px; }
#status-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  margin-right: 5px;
  transition: background .3s;
}
#status-dot.live { background: var(--green); animation: pulse 2s cubic-bezier(.4,0,.6,1) infinite; }
#status-dot.error { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.header-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 10px;
  color: var(--muted);
}
.header-meta .sep { color: var(--border2); }
#queue-badge {
  padding: 2px 7px;
  border-radius: 12px;
  background: var(--panel);
  border: 1px solid var(--border2);
  transition: color .3s, border-color .3s;
}
#queue-badge.busy { color: var(--amber); border-color: rgba(245,158,11,.3); }

/* ── Body row ────────────────────────────────────── */
#body { flex: 1; display: flex; overflow: hidden; }

/* ── Sidebar ─────────────────────────────────────── */
#sidebar {
  flex-shrink: 0;
  width: 212px;
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-head {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  height: 38px;
  border-bottom: 1px solid var(--border);
}
.section-label {
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--muted);
}
.btn-icon {
  width: 22px; height: 22px;
  border: 1px solid var(--border2);
  border-radius: var(--r);
  background: transparent;
  color: var(--dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  line-height: 1;
  transition: color .15s, border-color .15s, background .15s;
}
.btn-icon:hover { color: var(--violet3); border-color: var(--violet2); background: rgba(109,40,217,.1); }

#watchlist-list { flex: 1; overflow-y: auto; padding: 6px 0; }

.wl-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 14px;
  cursor: pointer;
  transition: background .12s;
  position: relative;
}
.wl-item:hover { background: rgba(255,255,255,.03); }
.wl-item.selected { background: rgba(109,40,217,.08); }
.wl-item.selected::before {
  content: '';
  position: absolute;
  left: 0; top: 6px; bottom: 6px;
  width: 2px;
  background: var(--violet2);
  border-radius: 0 2px 2px 0;
}

/* Toggle */
.toggle { position: relative; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track {
  display: block;
  width: 26px; height: 14px;
  border-radius: 7px;
  background: var(--border2);
  transition: background .2s;
  cursor: pointer;
  position: relative;
}
.toggle input:checked + .toggle-track { background: var(--violet); }
.toggle-thumb {
  position: absolute;
  top: 2px; left: 2px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #fff;
  pointer-events: none;
  transition: transform .2s;
}
.toggle input:checked ~ .toggle-thumb { transform: translateX(12px); }

.wl-name {
  flex: 1;
  min-width: 0;
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text2);
  transition: color .15s;
}
.wl-item:hover .wl-name, .wl-item.selected .wl-name { color: var(--text); }
.wl-name.inactive { color: var(--muted); }

.wl-edit {
  flex-shrink: 0;
  opacity: 0;
  background: transparent;
  border: none;
  color: var(--dim);
  font-size: 11px;
  padding: 2px;
  border-radius: 3px;
  transition: opacity .12s, color .12s;
}
.wl-item:hover .wl-edit { opacity: 1; }
.wl-edit:hover { color: var(--violet3); }

.sidebar-foot {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  padding: 12px 14px;
}
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 5px;
}
.stat-row:last-child { margin-bottom: 0; }
.stat-label { font-size: 10px; color: var(--muted); }
.stat-val { font-size: 10px; color: var(--text2); }
.stat-val.green { color: var(--green2); }
.bar-track {
  height: 2px;
  background: var(--border2);
  border-radius: 1px;
  margin-top: 8px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: var(--violet);
  border-radius: 1px;
  transition: width .6s cubic-bezier(.4,0,.2,1);
}

/* ── Feed ────────────────────────────────────────── */
#feed-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
#feed-toolbar {
  flex-shrink: 0;
  height: 38px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
}
.filter-group { display: flex; gap: 2px; }
.filter-btn {
  border: none;
  background: transparent;
  color: var(--muted);
  font-size: 10px;
  padding: 4px 9px;
  border-radius: 4px;
  letter-spacing: .03em;
  transition: color .12s, background .12s;
}
.filter-btn:hover { color: var(--text2); background: rgba(255,255,255,.04); }
.filter-btn.active { color: var(--violet3); background: rgba(109,40,217,.12); }
.feed-actions { display: flex; align-items: center; gap: 8px; }
.feed-count { font-size: 10px; color: var(--muted); }
.btn-clear {
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 4px;
  transition: color .12s, background .12s;
}
.btn-clear:hover { color: var(--text2); background: rgba(255,255,255,.04); }

#feed-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.feed-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--border2);
  gap: 8px;
  user-select: none;
}
.feed-empty-icon { font-size: 28px; }
.feed-empty-text { font-size: 11px; }

/* Event card */
.ev-card {
  display: flex;
  border: 1px solid var(--border);
  border-radius: var(--r2);
  background: var(--surface);
  cursor: pointer;
  overflow: hidden;
  transition: border-color .15s, background .15s;
  animation: slideIn .18s ease-out;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: none; } }
.ev-card:hover { border-color: var(--border2); background: var(--panel); }
.ev-card.match { border-color: rgba(16,185,129,.2); }
.ev-card.match:hover { border-color: rgba(16,185,129,.4); }
.ev-card.selected { border-color: var(--violet2) !important; background: rgba(109,40,217,.06) !important; }

.ev-accent { width: 3px; flex-shrink: 0; }
.ev-accent.match { background: var(--green); }
.ev-accent.skip  { background: var(--border2); }

.ev-body { flex: 1; min-width: 0; padding: 10px 12px; }
.ev-top {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .07em;
  padding: 2px 6px;
  border-radius: 4px;
}
.badge.match { background: rgba(16,185,129,.12); color: var(--green2); border: 1px solid rgba(16,185,129,.2); }
.badge.skip  { background: rgba(255,255,255,.04); color: var(--muted); border: 1px solid var(--border); }
.ev-wl {
  font-size: 10px;
  color: var(--violet3);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 120px;
}
.ev-score {
  font-size: 11px;
  font-weight: 600;
}
.ev-score.high { color: var(--green2); }
.ev-score.mid  { color: var(--amber); }
.ev-score.low  { color: var(--muted); }
.ev-time { margin-left: auto; font-size: 10px; color: var(--muted); flex-shrink: 0; }

.ev-pubkey { font-size: 10px; color: var(--muted); margin-bottom: 5px; font-variant-numeric: tabular-nums; }
.ev-content {
  font-size: 11px;
  color: var(--text2);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  word-break: break-word;
}
.ev-ai-msg {
  margin-top: 5px;
  font-size: 10px;
  color: rgba(52,211,153,.65);
  font-style: italic;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ev-chevron { display: flex; align-items: center; padding: 0 10px; color: var(--border2); font-size: 11px; flex-shrink: 0; transition: color .15s; }
.ev-card:hover .ev-chevron { color: var(--dim); }
.ev-card.selected .ev-chevron { color: var(--violet3); }

/* ── Detail panel ────────────────────────────────── */
#detail-panel {
  flex-shrink: 0;
  width: 340px;
  border-left: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width .2s cubic-bezier(.4,0,.2,1);
}
#detail-panel.collapsed { width: 0; border-left: none; }

#detail-head {
  flex-shrink: 0;
  height: 38px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
}
#detail-close {
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 14px;
  padding: 2px 4px;
  border-radius: 4px;
  transition: color .12s;
  line-height: 1;
}
#detail-close:hover { color: var(--text); }
#detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Stats (default detail state) */
#stats-view { display: flex; flex-direction: column; gap: 16px; }
.stat-block {}
.stat-block-label { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 4px; }
.stat-block-val { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1.1; }
.stat-block-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
.stat-block-val.green { color: var(--green2); }
.stat-block-val.amber { color: var(--amber); }
.stat-divider { height: 1px; background: var(--border); }

/* Event detail */
#event-view { display: none; flex-direction: column; gap: 14px; }
#event-view.visible { display: flex; }
#stats-view.hidden { display: none; }

.detail-section-label { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 6px; }
.detail-row {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 8px 10px;
}
.detail-mono {
  font-size: 10px;
  color: var(--text2);
  word-break: break-all;
  line-height: 1.6;
}
.detail-copy-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}
.btn-copy {
  flex-shrink: 0;
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 10px;
  padding: 2px 5px;
  border-radius: 3px;
  transition: color .12s;
  white-space: nowrap;
}
.btn-copy:hover { color: var(--violet3); }
.btn-copy.copied { color: var(--green2); }

.detail-content {
  font-size: 11px;
  color: var(--text2);
  line-height: 1.65;
  word-break: break-word;
  white-space: pre-wrap;
}
.detail-ai-msg {
  font-size: 11px;
  color: rgba(52,211,153,.8);
  font-style: italic;
  line-height: 1.55;
}
.score-display {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.score-big {
  font-size: 32px;
  font-weight: 700;
  line-height: 1;
}
.score-big.high { color: var(--green2); }
.score-big.mid  { color: var(--amber); }
.score-big.low  { color: var(--muted); }

.actions-list { display: flex; flex-direction: column; gap: 4px; }
.action-item {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 7px 10px;
  font-size: 10px;
  color: var(--text2);
  line-height: 1.5;
}
.action-bullet { color: var(--violet3); flex-shrink: 0; margin-top: 1px; }

.detail-link {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 8px 10px;
  font-size: 10px;
  color: var(--violet3);
  transition: border-color .12s;
  overflow: hidden;
}
.detail-link:hover { border-color: var(--violet2); }
.detail-link span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Raw / fields view tabs */
.detail-tabs {
  display: flex;
  gap: 2px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 3px;
}
.detail-tab {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: var(--font);
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  padding: 4px 0;
  border-radius: 4px;
  cursor: pointer;
  transition: color .12s, background .12s;
}
.detail-tab:hover { color: var(--text2); }
.detail-tab.active { background: var(--border2); color: var(--text); }

/* KV fields table */
.kv-table { display: flex; flex-direction: column; gap: 2px; }
.kv-row {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 6px;
  align-items: flex-start;
  padding: 5px 8px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
}
.kv-key {
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--muted);
  padding-top: 1px;
}
.kv-val {
  font-size: 10px;
  color: var(--text2);
  word-break: break-all;
  line-height: 1.5;
  max-height: 60px;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
}
.kv-val.expand { max-height: none; -webkit-line-clamp: unset; }
.kv-tags-list { display: flex; flex-direction: column; gap: 2px; }
.kv-tag-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.kv-tag-pill {
  background: rgba(109,40,217,.1);
  border: 1px solid rgba(109,40,217,.2);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 9px;
  color: var(--violet3);
}
.kv-tag-pill.first { background: rgba(109,40,217,.2); color: #c4b5fd; }

/* Raw JSON view */
.raw-json {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 10px;
  font-size: 10px;
  color: var(--text2);
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 340px;
  overflow-y: auto;
}
.raw-json .json-key   { color: var(--violet3); }
.raw-json .json-str   { color: #86efac; }
.raw-json .json-num   { color: #fbbf24; }
.raw-json .json-bool  { color: #f87171; }
.raw-json .json-null  { color: var(--muted); }

/* njump links row */
.njump-row {
  display: flex;
  gap: 6px;
}
.njump-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 7px 8px;
  font-family: var(--font);
  font-size: 10px;
  color: var(--violet3);
  cursor: pointer;
  text-decoration: none;
  transition: border-color .12s, background .12s;
}
.njump-btn:hover { border-color: var(--violet2); background: rgba(109,40,217,.08); }

/* ── Modal ───────────────────────────────────────── */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(3px);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal {
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 22px 22px 20px;
  width: 440px;
  max-width: calc(100vw - 32px);
  max-height: calc(100vh - 64px);
  overflow-y: auto;
}
.modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}
.modal-title { font-size: 13px; font-weight: 600; color: var(--text); }
#modal-close {
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 16px;
  padding: 2px 4px;
  transition: color .12s;
}
#modal-close:hover { color: var(--text); }
.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--muted);
  margin-bottom: 5px;
}
.form-hint { font-size: 9px; color: var(--border2); text-transform: none; letter-spacing: 0; margin-left: 6px; }
.form-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  color: var(--text);
  font-family: var(--font);
  font-size: 11px;
  padding: 8px 10px;
  outline: none;
  transition: border-color .15s;
  resize: none;
}
.form-input:focus { border-color: var(--violet2); }
.form-input::placeholder { color: var(--muted); }
.form-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.form-toggle-label { font-size: 11px; color: var(--text2); }
.modal-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.modal-footer-right { display: flex; gap: 8px; }

.btn {
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: var(--r);
  color: var(--text2);
  font-family: var(--font);
  font-size: 10px;
  padding: 6px 14px;
  cursor: pointer;
  transition: background .12s, color .12s, border-color .12s;
}
.btn:hover { background: rgba(255,255,255,.05); color: var(--text); }
.btn.primary {
  background: var(--violet);
  border-color: var(--violet2);
  color: #ede9fe;
}
.btn.primary:hover { background: var(--violet2); }
.btn.danger {
  background: rgba(239,68,68,.08);
  border-color: rgba(239,68,68,.2);
  color: #f87171;
}
.btn.danger:hover { background: rgba(239,68,68,.15); }
.btn:disabled { opacity: .5; cursor: not-allowed; }

#modal-error {
  font-size: 10px;
  color: #f87171;
  margin-top: 10px;
  display: none;
}
#modal-error.visible { display: block; }

/* ── Delete confirm ──────────────────────────────── */
#confirm-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(3px);
  z-index: 110;
  align-items: center;
  justify-content: center;
}
#confirm-overlay.open { display: flex; }
#confirm-box {
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 22px;
  width: 340px;
  max-width: calc(100vw - 32px);
}
.confirm-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.confirm-msg { font-size: 11px; color: var(--text2); line-height: 1.55; margin-bottom: 20px; }
.confirm-actions { display: flex; justify-content: flex-end; gap: 8px; }

/* ── Toast ───────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 8px 14px;
  font-size: 11px;
  color: var(--text2);
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .2s, transform .2s;
  pointer-events: none;
  z-index: 200;
}
#toast.show { opacity: 1; transform: none; }
</style>
</head>
<body>
<div id="app">

  <!-- ── Header ── -->
  <header id="header">
    <div style="display:flex;align-items:center;gap:12px">
      <span class="logo">NostrMind <span>│</span></span>
      <span id="status-label" style="font-size:10px;color:var(--muted)">
        <span id="status-dot"></span><span id="status-text">connecting</span>
      </span>
    </div>
    <div class="header-meta">
      <span id="h-uptime">—</span>
      <span class="sep">·</span>
      <span id="h-model" style="color:var(--dim)">—</span>
      <span class="sep">·</span>
      <span id="h-relays">0 relays</span>
      <span class="sep">·</span>
      <span id="queue-badge" class="header-meta">0 queued</span>
    </div>
  </header>

  <!-- ── Body ── -->
  <div id="body">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-head">
        <span class="section-label">Watchlists</span>
        <button class="btn-icon" id="btn-new-wl" title="New watchlist">+</button>
      </div>
      <div id="watchlist-list"></div>
      <div class="sidebar-foot">
        <div class="stat-row">
          <span class="stat-label">total processed</span>
          <span class="stat-val" id="sf-total">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">total matches</span>
          <span class="stat-val green" id="sf-matches">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">hit rate</span>
          <span class="stat-val" id="sf-hitrate">—</span>
        </div>
        <div class="bar-track"><div class="bar-fill" id="sf-bar" style="width:0%"></div></div>
      </div>
    </aside>

    <!-- Feed -->
    <section id="feed-panel">
      <div id="feed-toolbar">
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">all</button>
          <button class="filter-btn" data-filter="match">matches</button>
        </div>
        <div class="feed-actions">
          <span class="feed-count" id="feed-count">0 events</span>
          <button class="btn-clear" id="btn-clear-feed">clear</button>
        </div>
      </div>
      <div id="feed-list">
        <div class="feed-empty" id="feed-empty">
          <div class="feed-empty-icon">⚡</div>
          <div class="feed-empty-text">Waiting for events…</div>
        </div>
      </div>
    </section>

    <!-- Detail / Stats panel -->
    <aside id="detail-panel">
      <div id="detail-head">
        <span class="section-label" id="detail-head-label">Overview</span>
        <button id="detail-close" style="display:none">✕</button>
      </div>
      <div id="detail-body">

        <!-- Stats view (default) -->
        <div id="stats-view">
          <div class="stat-block">
            <div class="stat-block-label">Processed / hr</div>
            <div class="stat-block-val" id="sv-per-hr">—</div>
            <div class="stat-block-sub" id="sv-per-hr-sub"></div>
          </div>
          <div class="stat-block">
            <div class="stat-block-label">Matches / hr</div>
            <div class="stat-block-val green" id="sv-matches-hr">—</div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-block">
            <div class="stat-block-label">Session</div>
            <div style="display:flex;justify-content:space-between;margin-top:4px">
              <div>
                <div style="font-size:10px;color:var(--muted)">seen</div>
                <div style="font-size:16px;font-weight:600;color:var(--text)" id="sv-sess-events">0</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:10px;color:var(--muted)">matched</div>
                <div style="font-size:16px;font-weight:600;color:var(--green2)" id="sv-sess-matches">0</div>
              </div>
            </div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-block">
            <div class="stat-block-label">AI Queue</div>
            <div class="stat-block-val" id="sv-queue">—</div>
            <div class="stat-block-sub" id="sv-queue-sub"></div>
          </div>
        </div>

        <!-- Event detail view -->
        <div id="event-view">
          <!-- filled dynamically -->
        </div>

      </div>
    </aside>

  </div>
</div>

<!-- Watchlist modal -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-head">
      <span class="modal-title" id="modal-title">New Watchlist</span>
      <button id="modal-close">✕</button>
    </div>
    <form id="modal-form" autocomplete="off">
      <div class="form-group">
        <label class="form-label">Name</label>
        <input class="form-input" id="f-name" type="text" placeholder="e.g. Bitcoin News" required>
      </div>
      <div class="form-group">
        <label class="form-label">AI Prompt</label>
        <textarea class="form-input" id="f-prompt" rows="4" placeholder="Describe what you want to be alerted about…" required></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Event Kinds <span class="form-hint">comma-separated · e.g. 1, 30402</span></label>
        <input class="form-input" id="f-kinds" type="text" placeholder="1">
      </div>
      <div class="form-group">
        <label class="form-label">Since <span class="form-hint">unix timestamp · optional</span></label>
        <input class="form-input" id="f-since" type="number" placeholder="leave blank for all time">
      </div>
      <div class="form-row">
        <span class="form-toggle-label">Active</span>
        <label class="toggle">
          <input type="checkbox" id="f-active" checked>
          <span class="toggle-track"></span>
          <span class="toggle-thumb"></span>
        </label>
      </div>
      <div id="modal-error"></div>
      <div class="modal-footer">
        <div>
          <button type="button" class="btn danger" id="btn-delete-wl" style="display:none">Delete</button>
        </div>
        <div class="modal-footer-right">
          <button type="button" class="btn" id="btn-modal-cancel">Cancel</button>
          <button type="submit" class="btn primary" id="btn-modal-save">Create</button>
        </div>
      </div>
    </form>
  </div>
</div>

<!-- Delete confirm -->
<div id="confirm-overlay">
  <div id="confirm-box">
    <div class="confirm-title">Delete Watchlist</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-actions">
      <button class="btn" id="btn-confirm-cancel">Cancel</button>
      <button class="btn danger" id="btn-confirm-ok">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════
   State
═══════════════════════════════════════════════════════ */
const S = {
  watchlists: [],
  feed: [],
  stats: {},
  filter: 'all',
  selectedId: null,   // selected feed item _id
  sessionEvents: 0,
  sessionMatches: 0,
  sseStatus: 'connecting',
  _nextId: 0,
  // modal
  modalWl: null,      // null = new, object = edit
};

/* ═══════════════════════════════════════════════════════
   API helpers
═══════════════════════════════════════════════════════ */
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(path, opts);
  if (res.status === 204) return null;
  return res.json().then(d => ({ ok: res.ok, status: res.status, data: d }));
}

/* ═══════════════════════════════════════════════════════
   SSE
═══════════════════════════════════════════════════════ */
let sseSource = null;
function connectSSE() {
  setStatus('connecting');
  sseSource = new EventSource('/api/events/stream');

  sseSource.onopen = () => setStatus('live');

  sseSource.onmessage = (e) => {
    try {
      const ev = JSON.parse(e.data);
      ev._id = ++S._nextId;
      S.feed.unshift(ev);
      if (S.feed.length > 150) S.feed.length = 150;
      S.sessionEvents++;
      if (ev.type === 'match') S.sessionMatches++;
      renderFeed();
      updateSessionStats();
    } catch (_) {}
  };

  sseSource.onerror = () => {
    setStatus('offline');
    sseSource.close();
    setTimeout(connectSSE, 5000);
  };
}

function setStatus(s) {
  S.sseStatus = s;
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = s;
  txt.textContent = s;
}

/* ═══════════════════════════════════════════════════════
   Fetch data
═══════════════════════════════════════════════════════ */
async function fetchStats() {
  try {
    const res = await fetch('/api/stats');
    S.stats = await res.json();
    renderStats();
    renderHeader();
  } catch (_) {}
}

async function fetchWatchlists() {
  try {
    const res = await api('GET', '/api/watchlists');
    if (res.ok) {
      S.watchlists = res.data.data ?? [];
      renderSidebar();
    }
  } catch (_) {}
}

/* ═══════════════════════════════════════════════════════
   Render helpers
═══════════════════════════════════════════════════════ */
function fmt(n) { return (n ?? 0).toLocaleString(); }

function timeAgo(iso) {
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 5)    return 'now';
  if (diff < 60)   return Math.floor(diff) + 's';
  if (diff < 3600) return Math.floor(diff / 60) + 'm';
  return Math.floor(diff / 3600) + 'h';
}

function truncatePk(pk) {
  if (!pk) return '';
  return pk.slice(0, 8) + '…' + pk.slice(-6);
}

function scoreClass(s) {
  if (s == null) return '';
  return s >= 0.7 ? 'high' : s >= 0.4 ? 'mid' : 'low';
}

function fmtUptime(ms) {
  if (!ms) return '—';
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);
  if (d > 0)  return d + 'd ' + (h % 24) + 'h';
  if (h > 0)  return h + 'h ' + (m % 60) + 'm';
  return m + 'm ' + (s % 60) + 's';
}

/* ═══════════════════════════════════════════════════════
   Render: Header
═══════════════════════════════════════════════════════ */
function renderHeader() {
  const st = S.stats;
  document.getElementById('h-uptime').textContent = fmtUptime(st.uptime);
  const model = st.aiModel ? truncate(st.aiModel, 24) : (st.aiProvider ?? '—');
  document.getElementById('h-model').textContent = model;
  document.getElementById('h-relays').textContent = (st.relayCount ?? 0) + ' relays';
  const q = st.aiQueuePending ?? 0;
  const qb = document.getElementById('queue-badge');
  qb.textContent = q + ' queued';
  qb.className = q > 50 ? 'busy' : '';
}

function truncate(str, n) {
  return str && str.length > n ? str.slice(0, n) + '…' : (str ?? '');
}

/* ═══════════════════════════════════════════════════════
   Render: Sidebar
═══════════════════════════════════════════════════════ */
function renderSidebar() {
  const container = document.getElementById('watchlist-list');
  if (!S.watchlists.length) {
    container.innerHTML = '<div style="padding:14px;font-size:10px;color:var(--muted)">No watchlists yet.</div>';
    return;
  }
  container.innerHTML = S.watchlists.map(wl => `
    <div class="wl-item" data-wl-id="${wl.id}">
      <label class="toggle" onclick="event.stopPropagation()">
        <input type="checkbox" ${wl.active ? 'checked' : ''} onchange="toggleWatchlist('${wl.id}', this.checked)">
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </label>
      <span class="wl-name ${wl.active ? '' : 'inactive'}">${esc(wl.name)}</span>
      <button class="wl-edit" onclick="event.stopPropagation(); openModal('${wl.id}')" title="Edit">✎</button>
    </div>
  `).join('');

  // sidebar footer stats
  const t = S.stats.totalProcessed ?? 0;
  const m = S.stats.totalMatches ?? 0;
  document.getElementById('sf-total').textContent = fmt(t);
  document.getElementById('sf-matches').textContent = fmt(m);
  const hr = t > 0 ? ((m / t) * 100).toFixed(1) + '%' : '—';
  document.getElementById('sf-hitrate').textContent = hr;
  document.getElementById('sf-bar').style.width = t > 0 ? Math.min(100, (m / t) * 100) + '%' : '0%';
}

/* ═══════════════════════════════════════════════════════
   Render: Feed
═══════════════════════════════════════════════════════ */
function filteredFeed() {
  return S.filter === 'match' ? S.feed.filter(e => e.type === 'match') : S.feed;
}

function renderFeed() {
  const items = filteredFeed();
  const container = document.getElementById('feed-list');
  document.getElementById('feed-empty').style.display = items.length ? 'none' : 'flex';
  document.getElementById('feed-count').textContent = S.feed.length + ' events';

  // Only add new cards instead of full re-render when possible
  // For simplicity and correctness on filter change: full render but efficient
  container.innerHTML = '<div class="feed-empty" id="feed-empty" style="display:' + (items.length ? 'none' : 'flex') + '"><div class="feed-empty-icon">⚡</div><div class="feed-empty-text">Waiting for events…</div></div>' +
    items.map(ev => evCardHTML(ev)).join('');
}

function evCardHTML(ev) {
  const isMatch = ev.type === 'match';
  const score = ev.matchScore;
  const selected = ev._id === S.selectedId ? ' selected' : '';
  const aiMsg = isMatch && ev.message
    ? `<div class="ev-ai-msg">${esc(ev.message)}</div>` : '';
  const scoreEl = score != null
    ? `<span class="ev-score ${scoreClass(score)}">${Math.round(score * 100)}%</span>` : '';
  const wlName = ev.watchlistName ? `<span class="ev-wl">${esc(ev.watchlistName)}</span>` : '';

  return `<div class="ev-card ${isMatch ? 'match' : ''}${selected}" data-ev-id="${ev._id}">
    <div class="ev-accent ${isMatch ? 'match' : 'skip'}"></div>
    <div class="ev-body">
      <div class="ev-top">
        <span class="badge ${isMatch ? 'match' : 'skip'}">${isMatch ? '✓ match' : '— skip'}</span>
        ${wlName}${scoreEl}
        <span class="ev-time">${timeAgo(ev.timestamp)}</span>
      </div>
      <div class="ev-pubkey">${truncatePk(ev.eventPubkey)}</div>
      <div class="ev-content">${esc(ev.content ?? '')}</div>
      ${aiMsg}
    </div>
    <div class="ev-chevron">›</div>
  </div>`;
}

function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ═══════════════════════════════════════════════════════
   Render: Stats panel
═══════════════════════════════════════════════════════ */
function renderStats() {
  const st = S.stats;
  document.getElementById('sv-per-hr').textContent = fmt(st.processedLastHour);
  document.getElementById('sv-matches-hr').textContent = fmt(st.matchesLastHour);
  const q = st.aiQueuePending ?? 0;
  const qEl = document.getElementById('sv-queue');
  qEl.textContent = fmt(q);
  qEl.className = 'stat-block-val' + (q > 50 ? ' amber' : '');
  const shed = st.aiQueueShed ?? 0;
  document.getElementById('sv-queue-sub').textContent = shed > 0 ? shed + ' shed' : 'pending';
  renderSidebar(); // updates sidebar footer too
}

function updateSessionStats() {
  document.getElementById('sv-sess-events').textContent = S.sessionEvents;
  document.getElementById('sv-sess-matches').textContent = S.sessionMatches;
}

/* ═══════════════════════════════════════════════════════
   NIP-19 bech32 encoder (minimal — npub / nevent)
═══════════════════════════════════════════════════════ */
const BECH32_CHARSET = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';
function bech32Encode(prefix, words) {
  const GEN = [0x3b6a57b2,0x26508e6d,0x1ea119fa,0x3d4233dd,0x2a1462b3];
  function polymod(values) {
    let chk = 1;
    for (const v of values) {
      const top = chk >>> 25;
      chk = ((chk & 0x1ffffff) << 5) ^ v;
      for (let i = 0; i < 5; i++) if ((top >>> i) & 1) chk ^= GEN[i];
    }
    return chk;
  }
  function hrpExpand(hrp) {
    const r = [];
    for (const c of hrp) r.push(c.charCodeAt(0) >>> 5);
    r.push(0);
    for (const c of hrp) r.push(c.charCodeAt(0) & 31);
    return r;
  }
  function createChecksum(hrp, data) {
    const values = hrpExpand(hrp).concat(data).concat([0,0,0,0,0,0]);
    const mod = polymod(values) ^ 1;
    return Array.from({length:6}, (_,i) => (mod >>> (5*(5-i))) & 31);
  }
  const combined = words.concat(createChecksum(prefix, words));
  return prefix + '1' + combined.map(b => BECH32_CHARSET[b]).join('');
}
function toWords(bytes) {
  let value = 0, bits = 0;
  const out = [];
  for (const b of bytes) {
    value = (value << 8) | b;
    bits += 8;
    while (bits >= 5) { bits -= 5; out.push((value >>> bits) & 31); }
  }
  if (bits > 0) out.push((value << (5 - bits)) & 31);
  return out;
}
function hexToBytes(hex) {
  const out = [];
  for (let i = 0; i < hex.length; i += 2) out.push(parseInt(hex.slice(i, i+2), 16));
  return out;
}
function toNpub(hex) {
  try { return bech32Encode('npub', toWords(hexToBytes(hex))); } catch { return hex; }
}
function toNevent(eventId, pubkey, kind) {
  // TLV: type 0 = event id (32 bytes), type 2 = author pubkey (32 bytes), type 3 = kind (4 bytes big-endian)
  const idBytes = hexToBytes(eventId);
  const pkBytes = hexToBytes(pubkey);
  const kindBytes = [(kind >>> 24) & 0xff, (kind >>> 16) & 0xff, (kind >>> 8) & 0xff, kind & 0xff];
  const tlv = [
    0, idBytes.length, ...idBytes,
    2, pkBytes.length, ...pkBytes,
    3, 4, ...kindBytes,
  ];
  try { return bech32Encode('nevent', toWords(tlv)); } catch { return eventId; }
}

/* ═══════════════════════════════════════════════════════
   JSON syntax highlighter
═══════════════════════════════════════════════════════ */
function highlightJson(obj) {
  const json = JSON.stringify(obj, null, 2);
  return json
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
      if (/^"/.test(match)) {
        if (/:$/.test(match)) return `<span class="json-key">${match}</span>`;
        return `<span class="json-str">${match}</span>`;
      }
      if (/true|false/.test(match)) return `<span class="json-bool">${match}</span>`;
      if (/null/.test(match)) return `<span class="json-null">${match}</span>`;
      return `<span class="json-num">${match}</span>`;
    });
}

/* ═══════════════════════════════════════════════════════
   Event detail panel
═══════════════════════════════════════════════════════ */
let detailTab = 'fields'; // 'fields' | 'raw'

function openDetail(evId) {
  const ev = S.feed.find(e => e._id === evId);
  if (!ev) return;
  S.selectedId = evId;
  detailTab = 'fields';
  renderFeed();
  renderDetailPanel(ev);
}

function renderDetailPanel(ev) {
  const score = ev.matchScore;
  const isMatch = ev.type === 'match';
  const npub = toNpub(ev.eventPubkey ?? '');
  const nevent = toNevent(ev.eventId ?? '', ev.eventPubkey ?? '', ev.eventKind ?? 1);

  // Build raw event object
  const rawEvent = {
    id: ev.eventId,
    pubkey: ev.eventPubkey,
    created_at: ev.eventCreatedAt,
    kind: ev.eventKind,
    tags: ev.eventTags ?? [],
    content: ev.content,
    sig: ev.eventSig,
  };

  // ── Header: watchlist + score ──
  let html = `<div class="score-display">
    <div>
      <div class="detail-section-label">Watchlist</div>
      <div style="font-size:13px;font-weight:600;color:var(--violet3)">${esc(ev.watchlistName ?? '—')}</div>
    </div>`;
  if (score != null) {
    html += `<div style="text-align:right">
      <div class="detail-section-label">Score</div>
      <div class="score-big ${scoreClass(score)}">${Math.round(score * 100)}%</div>
    </div>`;
  }
  html += `</div>`;

  // ── njump links ──
  html += `<div>
    <div class="detail-section-label">Open on njump</div>
    <div class="njump-row">
      <a class="njump-btn" href="https://njump.me/${nevent}" target="_blank" rel="noopener" title="${nevent}">
        ↗ <span>event</span>
      </a>
      <a class="njump-btn" href="https://njump.me/${npub}" target="_blank" rel="noopener" title="${npub}">
        ↗ <span>author</span>
      </a>
    </div>
  </div>`;

  // ── AI reasoning ──
  if (ev.message) {
    html += `<div>
      <div class="detail-section-label">AI Reasoning</div>
      <div class="detail-row" style="${isMatch ? 'border-color:rgba(16,185,129,.25)' : ''}">
        <div class="detail-ai-msg">${esc(ev.message)}</div>
      </div>
    </div>`;
  }

  // ── Recommended actions ──
  if (ev.recommendedActions && ev.recommendedActions.length) {
    html += `<div>
      <div class="detail-section-label">Recommended Actions</div>
      <div class="actions-list">
        ${ev.recommendedActions.map(a => `<div class="action-item"><span class="action-bullet">›</span><span>${esc(a)}</span></div>`).join('')}
      </div>
    </div>`;
  }

  // ── Actionable link ──
  if (ev.actionableLink) {
    html += `<div>
      <div class="detail-section-label">Link</div>
      <a class="detail-link" href="${esc(ev.actionableLink)}" target="_blank" rel="noopener">
        <span>↗</span><span>${esc(ev.actionableLink)}</span>
      </a>
    </div>`;
  }

  // ── Fields / Raw tabs ──
  html += `<div>
    <div class="detail-section-label">Event Data</div>
    <div class="detail-tabs" style="margin-bottom:8px">
      <button class="detail-tab ${detailTab==='fields'?'active':''}" onclick="switchDetailTab('fields')">Fields</button>
      <button class="detail-tab ${detailTab==='raw'?'active':''}" onclick="switchDetailTab('raw')">Raw JSON</button>
    </div>
    <div id="detail-fields-view" style="display:${detailTab==='fields'?'block':'none'}">
      ${buildKvTable(ev, rawEvent, npub, nevent)}
    </div>
    <div id="detail-raw-view" style="display:${detailTab==='raw'?'block':'none'}">
      <div style="display:flex;justify-content:flex-end;margin-bottom:5px">
        <button class="btn-copy" onclick="copyRawEvent(this)">copy raw</button>
      </div>
      <div class="raw-json" id="detail-raw-json">${highlightJson(rawEvent)}</div>
    </div>
  </div>`;

  document.getElementById('event-view').innerHTML = html;
  document.getElementById('event-view').classList.add('visible');
  document.getElementById('stats-view').classList.add('hidden');
  document.getElementById('detail-head-label').textContent = isMatch ? '✓ Match' : 'Event';
  document.getElementById('detail-close').style.display = 'block';

  // store raw for copy
  window._currentRawEvent = rawEvent;
}

function buildKvTable(ev, raw, npub, nevent) {
  const rows = [
    ['id', `<span>${esc(ev.eventId ?? '')}</span><button class="btn-copy" style="margin-left:4px;vertical-align:middle" onclick="copyText('${esc(ev.eventId)}',this)">copy</button>`],
    ['pubkey (hex)', `<span>${esc(ev.eventPubkey ?? '')}</span><button class="btn-copy" style="margin-left:4px;vertical-align:middle" onclick="copyText('${esc(ev.eventPubkey)}',this)">copy</button>`],
    ['npub', `<span>${esc(npub)}</span><button class="btn-copy" style="margin-left:4px;vertical-align:middle" onclick="copyText('${esc(npub)}',this)">copy</button>`],
    ['nevent', `<span style="word-break:break-all">${esc(nevent.slice(0,28))}…</span><button class="btn-copy" style="margin-left:4px;vertical-align:middle" onclick="copyText('${esc(nevent)}',this)">copy</button>`],
    ['kind', String(ev.eventKind ?? '—')],
    ['created_at', ev.eventCreatedAt ? `${new Date(ev.eventCreatedAt * 1000).toISOString()} <span style="color:var(--muted)">(${ev.eventCreatedAt})</span>` : '—'],
    ['content', `<span class="kv-val" style="display:block;max-height:80px;overflow:hidden">${esc((ev.content ?? '').slice(0, 300))}${(ev.content?.length ?? 0) > 300 ? '…' : ''}</span>`],
    ['sig', ev.eventSig ? `<span style="word-break:break-all">${esc(ev.eventSig.slice(0,16))}…</span><button class="btn-copy" style="margin-left:4px;vertical-align:middle" onclick="copyText('${esc(ev.eventSig)}',this)">copy</button>` : '<span style="color:var(--muted)">—</span>'],
  ];

  const tagsHtml = (ev.eventTags && ev.eventTags.length)
    ? `<div class="kv-tags-list">${ev.eventTags.map(tag =>
        `<div class="kv-tag-row">${tag.map((t, i) =>
          `<span class="kv-tag-pill ${i===0?'first':''}">${esc(t)}</span>`
        ).join('')}</div>`
      ).join('')}</div>`
    : '<span style="color:var(--muted);font-size:10px">none</span>';

  rows.push(['tags', tagsHtml]);

  return `<div class="kv-table">${rows.map(([k, v]) =>
    `<div class="kv-row"><span class="kv-key">${esc(k)}</span><span class="kv-val">${v}</span></div>`
  ).join('')}</div>`;
}

function switchDetailTab(tab) {
  detailTab = tab;
  const fv = document.getElementById('detail-fields-view');
  const rv = document.getElementById('detail-raw-view');
  if (fv) fv.style.display = tab === 'fields' ? 'block' : 'none';
  if (rv) rv.style.display = tab === 'raw' ? 'block' : 'none';
  document.querySelectorAll('.detail-tab').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase().startsWith(tab));
  });
}

async function copyRawEvent(btn) {
  if (!window._currentRawEvent) return;
  await copyText(JSON.stringify(window._currentRawEvent, null, 2), btn);
}

function closeDetail() {
  S.selectedId = null;
  document.getElementById('event-view').classList.remove('visible');
  document.getElementById('stats-view').classList.remove('hidden');
  document.getElementById('detail-head-label').textContent = 'Overview';
  document.getElementById('detail-close').style.display = 'none';
  renderFeed();
}

async function copyText(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    const orig = btn.textContent;
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
  } catch (_) {}
}

/* ═══════════════════════════════════════════════════════
   Watchlist toggle
═══════════════════════════════════════════════════════ */
async function toggleWatchlist(id, active) {
  const wl = S.watchlists.find(w => w.id === id);
  if (wl) wl.active = active;
  try {
    await api('PATCH', `/api/watchlists/${id}`, { active });
  } catch (_) {
    if (wl) wl.active = !active;
    renderSidebar();
  }
}

/* ═══════════════════════════════════════════════════════
   Watchlist modal
═══════════════════════════════════════════════════════ */
function openModal(id) {
  const wl = id ? S.watchlists.find(w => w.id === id) : null;
  S.modalWl = wl ?? null;

  document.getElementById('modal-title').textContent = wl ? 'Edit Watchlist' : 'New Watchlist';
  document.getElementById('btn-modal-save').textContent = wl ? 'Save' : 'Create';
  document.getElementById('btn-delete-wl').style.display = wl ? 'inline-flex' : 'none';
  document.getElementById('modal-error').className = '';
  document.getElementById('modal-error').textContent = '';

  if (wl) {
    document.getElementById('f-name').value = wl.name ?? '';
    document.getElementById('f-prompt').value = wl.prompt ?? '';
    document.getElementById('f-kinds').value = (wl.filters?.kinds ?? [1]).join(', ');
    document.getElementById('f-since').value = wl.filters?.since ?? '';
    document.getElementById('f-active').checked = wl.active ?? true;
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-prompt').value = '';
    document.getElementById('f-kinds').value = '1';
    document.getElementById('f-since').value = '';
    document.getElementById('f-active').checked = true;
  }

  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  S.modalWl = null;
}

async function saveWatchlist(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-modal-save');
  const errEl = document.getElementById('modal-error');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  errEl.className = '';

  const kindsRaw = document.getElementById('f-kinds').value;
  const kinds = kindsRaw.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n));
  const since = parseInt(document.getElementById('f-since').value, 10);
  const filters = { kinds: kinds.length ? kinds : [1] };
  if (!isNaN(since) && since > 0) filters.since = since;

  const body = {
    name: document.getElementById('f-name').value.trim(),
    prompt: document.getElementById('f-prompt').value.trim(),
    active: document.getElementById('f-active').checked,
    filters,
  };

  try {
    let res;
    if (S.modalWl) {
      res = await api('PATCH', `/api/watchlists/${S.modalWl.id}`, body);
    } else {
      res = await api('POST', '/api/watchlists', body);
    }

    if (!res.ok) {
      errEl.textContent = res.data?.error ?? 'Something went wrong.';
      errEl.className = 'visible';
      return;
    }

    closeModal();
    await fetchWatchlists();
    toast(S.modalWl ? 'Watchlist updated.' : 'Watchlist created.');
  } catch (_) {
    errEl.textContent = 'Network error.';
    errEl.className = 'visible';
  } finally {
    btn.disabled = false;
    btn.textContent = S.modalWl ? 'Save' : 'Create';
  }
}

/* ═══════════════════════════════════════════════════════
   Delete confirm
═══════════════════════════════════════════════════════ */
function openDeleteConfirm() {
  const wl = S.modalWl;
  if (!wl) return;
  document.getElementById('confirm-msg').textContent =
    `"${wl.name}" will be permanently deleted.`;
  document.getElementById('confirm-overlay').classList.add('open');
}

function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('open');
}

async function confirmDelete() {
  const wl = S.modalWl;
  if (!wl) return;
  try {
    await api('DELETE', `/api/watchlists/${wl.id}`);
    closeConfirm();
    closeModal();
    await fetchWatchlists();
    toast('Watchlist deleted.');
  } catch (_) {
    closeConfirm();
  }
}

/* ═══════════════════════════════════════════════════════
   Toast
═══════════════════════════════════════════════════════ */
let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ═══════════════════════════════════════════════════════
   Event delegation
═══════════════════════════════════════════════════════ */
document.getElementById('feed-list').addEventListener('click', (e) => {
  const card = e.target.closest('.ev-card');
  if (!card) return;
  const id = parseInt(card.dataset.evId, 10);
  if (id === S.selectedId) { closeDetail(); return; }
  openDetail(id);
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    S.filter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    renderFeed();
  });
});

document.getElementById('btn-clear-feed').addEventListener('click', () => {
  S.feed = [];
  S.selectedId = null;
  closeDetail();
  renderFeed();
});

document.getElementById('btn-new-wl').addEventListener('click', () => openModal(null));
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('btn-modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', (e) => { if (e.target === document.getElementById('modal-overlay')) closeModal(); });
document.getElementById('modal-form').addEventListener('submit', saveWatchlist);
document.getElementById('btn-delete-wl').addEventListener('click', openDeleteConfirm);

document.getElementById('confirm-overlay').addEventListener('click', (e) => { if (e.target === document.getElementById('confirm-overlay')) closeConfirm(); });
document.getElementById('btn-confirm-cancel').addEventListener('click', closeConfirm);
document.getElementById('btn-confirm-ok').addEventListener('click', confirmDelete);
document.getElementById('detail-close').addEventListener('click', closeDetail);

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('confirm-overlay').classList.contains('open')) { closeConfirm(); return; }
    if (document.getElementById('modal-overlay').classList.contains('open')) { closeModal(); return; }
    if (S.selectedId) closeDetail();
  }
});

/* ═══════════════════════════════════════════════════════
   Init
═══════════════════════════════════════════════════════ */
(async function init() {
  await Promise.all([fetchWatchlists(), fetchStats()]);
  connectSSE();
  setInterval(fetchStats, 30_000);
})();
</script>
</body>
</html>
